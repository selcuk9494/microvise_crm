<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="microvise_crm">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>microvise_crm</title>
  <link rel="manifest" href="manifest.json">
  <script>
    window.microviseSubmitCredentialForm = function (email, password) {
      try {
        const iframeName = 'microvise_credential_sink';
        let iframe = document.querySelector('iframe[name="' + iframeName + '"]');
        if (!iframe) {
          iframe = document.createElement('iframe');
          iframe.name = iframeName;
          iframe.style.cssText = 'position:absolute;width:1px;height:1px;left:-9999px;top:-9999px;border:0;';
          iframe.setAttribute('aria-hidden', 'true');
          document.body.appendChild(iframe);
        }

        const form = document.createElement('form');
        form.method = 'post';
        form.action = '/';
        form.target = iframeName;
        form.style.cssText = 'position:absolute;width:1px;height:1px;left:-9999px;top:-9999px;opacity:0;';

        const userInput = document.createElement('input');
        userInput.type = 'text';
        userInput.name = 'username';
        userInput.autocomplete = 'username';
        userInput.value = String(email);

        const passwordInput = document.createElement('input');
        passwordInput.type = 'password';
        passwordInput.name = 'password';
        passwordInput.autocomplete = 'current-password';
        passwordInput.value = String(password);

        form.appendChild(userInput);
        form.appendChild(passwordInput);
        document.body.appendChild(form);
        form.submit();
        window.setTimeout(function () {
          form.remove();
        }, 1000);
        return true;
      } catch (_) {
        return false;
      }
    };

    window.microviseStorePasswordCredential = async function (email, password) {
      if (!email || !password || !navigator.credentials || !window.PasswordCredential) {
        return window.microviseSubmitCredentialForm(email, password);
      }
      try {
        const credential = new PasswordCredential({
          id: String(email),
          name: String(email),
          password: String(password)
        });
        await navigator.credentials.store(credential);
        window.microviseSubmitCredentialForm(email, password);
        return true;
      } catch (_) {
        return window.microviseSubmitCredentialForm(email, password);
      }
    };

    window.microviseRequestPasswordCredential = async function () {
      if (!navigator.credentials) return null;
      try {
        const credential = await navigator.credentials.get({
          password: true,
          mediation: 'required'
        });
        if (!credential) return null;
        return {
          id: credential.id || '',
          password: credential.password || ''
        };
      } catch (_) {
        return null;
      }
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
